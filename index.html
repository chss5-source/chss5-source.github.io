<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Cadastro de Cliente</h1>
    
    <p>Preencha os dados abaixo.</p>

    <form>
        <label>Nome:</label>
        <input type="text">
        <br>

        <label>E-mail:</label>
        <input type="email">
        <br>

        <label>Senha:</label>
        <input type="password">
        <br>

        <label>Data de Nascimento:</label>
        <input type="date">
        <br>

        <label>Cidade:</label>
        <select>
            <option>Maceió</option>
            <option>Recife</option>
            <option>Salvador</option>
        </select>
        <br><br>

        <label>Estado:</label>
        <br>

        <input type="radio" id="al" name="estado" value="AL">
        <label for="al">AL - Alagoas</label>
        <br>

        <input type="radio" id="pe" name="estado" value="PE">
        <label for="pe">PE - Pernambuco</label>
        <br>

        <input type="radio" id="ba" name="estado" value="BA">
        <label for="ba">BA - Bahia</label>
        <br><br>

        <label>Observações:</label>
        <br>
        <textarea></textarea>

        <br><br>

        <button type="submit">Enviar</button>
    </form>

    <footer>
        <p>Carlos Henrique e Amilton</p>
        <p>Desenvolvimento Web - 02/06/2026</p>
    </footer>

</body>
</html>
